version: 2
updates:
  # Check for npm updates in frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Check for Python/uv updates in backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Check for GitHub Action updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Check for Docker base image updates
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
