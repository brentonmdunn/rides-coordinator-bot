name: Migration check

on:
  pull_request:
    branches:
      - main
      - staging
    paths:
      - 'backend/bot/core/models.py'
      - 'backend/bot/core/base.py'
      - 'backend/alembic/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync

      - name: Check for multiple migration heads
        run: |
          heads=$(uv run alembic heads | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "ERROR: Multiple Alembic heads detected. Run 'alembic merge heads' to fix."
            exit 1
          fi

      - name: Run migrations to head and check for drift
        run: |
          mkdir -p db
          uv run alembic upgrade head
          uv run alembic check 2>&1 || {
            echo "::error::Model changes detected without a corresponding migration. Run 'alembic revision --autogenerate -m \"description\"' to generate one."
            exit 1
          }

      - name: Test downgrade
        run: |
          uv run alembic downgrade -1
          uv run alembic upgrade head
